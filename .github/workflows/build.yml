name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]
        include:
          - os: macos-latest
            platform: darwin
            arch: x64
            artifact_name: darwin-x64
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_name: darwin-arm64
          - os: windows-latest
            platform: win32
            arch: x64
            artifact_name: win32-x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: AppImage
            artifact_name: linux-x64-AppImage
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: deb
            artifact_name: linux-x64-deb
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: rpm
            artifact_name: linux-x64-rpm
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: pacman
            artifact_name: linux-x64-pacman

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Create Python virtual environment and install dependencies
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pip install -r backend/requirements.txt
          deactivate

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: ${{ startsWith(github.ref, 'refs/tags/v') }}
          args: "--${{ matrix.platform }} --${{ matrix.arch }} --target=${{ matrix.target || '' }} --publish=never --icon=public/icons/api_post64x64.ico"
          skip_build_deps_install: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*
          retention-days: 30

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
